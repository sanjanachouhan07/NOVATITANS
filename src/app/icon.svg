<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Crypto Things favicon</title>
  <desc id="desc">A fiery red monogram with a glowing circular sigil.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a0000" />
      <stop offset="55%" stop-color="#140000" />
      <stop offset="100%" stop-color="#050000" />
    </radialGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e8" />
      <stop offset="35%" stop-color="#ffb38a" />
      <stop offset="62%" stop-color="#ff6b47" />
      <stop offset="100%" stop-color="#7a0600" />
    </linearGradient>
    <linearGradient id="ember" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffd1b5" />
      <stop offset="100%" stop-color="#ff5030" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="40" fill="url(#bg)" />

  <circle
    cx="128"
    cy="128"
    r="96"
    fill="none"
    stroke="#ff3b1f"
    stroke-width="5"
    opacity="0.9"
    filter="url(#glow)"
  />
  <circle
    cx="128"
    cy="128"
    r="84"
    fill="none"
    stroke="#ff8a5f"
    stroke-width="2"
    opacity="0.5"
  />

  <g stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <path
      d="M99 66
         C73 66 55 88 55 127
         C55 165 74 189 103 189
         C121 189 136 182 148 169"
      fill="none"
      stroke="url(#metal)"
      stroke-width="20"
    />
    <path
      d="M94 84
         C80 87 71 102 71 127
         C71 152 81 167 96 171"
      fill="none"
      stroke="#2a0000"
      stroke-width="6"
      opacity="0.55"
    />

    <path d="M130 54 L130 200" stroke="url(#metal)" stroke-width="22" />
    <path d="M92 68 L173 68" stroke="url(#metal)" stroke-width="18" />
    <path d="M116 84 L146 84" stroke="#2a0000" stroke-width="5" opacity="0.5" />

    <path
      d="M136 129
         L198 90
         L164 127
         L205 168
         L140 137"
      fill="none"
      stroke="url(#ember)"
      stroke-width="16"
    />
    <path
      d="M141 124
         C150 111 161 104 174 101
         C167 111 165 120 167 128
         C176 134 184 145 189 158
         C176 154 164 147 153 138"
      fill="#3f0000"
      opacity="0.85"
    />
    <path
      d="M145 116 L152 122 M152 112 L159 119 M159 109 L166 117 M165 107 L172 116"
      stroke="#ffd9cc"
      stroke-width="2"
    />
  </g>

  <g stroke="#ffb299" stroke-width="2.5" opacity="0.95" filter="url(#glow)">
    <path d="M128 18 L128 38" />
    <path d="M128 218 L128 238" />
    <path d="M18 128 L38 128" />
    <path d="M218 128 L238 128" />
  </g>

  <g fill="#ffd6c8" filter="url(#glow)">
    <circle cx="128" cy="32" r="4" />
    <circle cx="128" cy="224" r="4" />
    <circle cx="32" cy="128" r="4" />
    <circle cx="224" cy="128" r="4" />
  </g>
</svg>
